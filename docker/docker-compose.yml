version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: shitpost-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shitpost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shitpost}
      POSTGRES_DB: ${POSTGRES_DB:-shitpost}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: shitpost-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
